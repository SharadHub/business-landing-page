`<div class="grid2">
<div>
<div class="section-label">Backend — full contact endpoint code</div>
<div class="folder" style="font-size:11px">
<span class="fc">// routes/contact.routes.js</span>
<span style="color:#185FA5">const</span> { body } = require('express-validator');
<span style="color:#185FA5">const</span> validate = require('../middleware/validate');
<span style="color:#185FA5">const</span> emailSvc = require('../services/email.service');

<span style="color:#185FA5">const</span> rules = [
  body('name').trim().notEmpty(),
  body('email').isEmail().normalizeEmail(),
  body('message').trim().isLength({ min: 10 })
];

router.post('/', limiter, rules, validate,
  async (req, res) => {
    <span style="color:#185FA5">const</span> { name, email, message } = req.body;
    <span style="color:#185FA5">await</span> emailSvc.sendContact({ name, email, message });
    res.json({ success: <span style="color:#A32D2D">true</span> });
  }
);
</div>
<div class="folder" style="font-size:11px;margin-top:8px">
<span class="fc">// services/email.service.js</span>
<span style="color:#185FA5">const</span> transporter = nodemailer.createTransport({
  service: 'gmail',
  auth: {
    user: process.env.EMAIL_USER,
    pass: process.env.EMAIL_PASS   <span class="fc">// App Password</span>
  }
});

sendContact = async ({ name, email, message }) => {
  <span class="fc">// 1. Notify owner</span>
  <span style="color:#185FA5">await</span> transporter.sendMail({
    from: process.env.EMAIL_USER,
    to: process.env.TO_EMAIL,
    subject: <span style="color:#3B6D11">\`New message from \${name}\`</span>,
    html: <span style="color:#3B6D11">\`&lt;p&gt;\${message}&lt;/p&gt;&lt;p&gt;Reply: \${email}&lt;/p&gt;\`</span>
  });
  <span class="fc">// 2. Auto-reply to sender</span>
  <span style="color:#185FA5">await</span> transporter.sendMail({
    from: process.env.EMAIL_USER,
